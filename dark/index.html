<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ساعت ڈیش بورڈ | Premium Saat</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        :root {
            --emerald-deep: #022c22;
            --emerald-mid: #064e3b;
            --emerald-light: #10b981;
            --gold: #d4af37;
            --gold-light: #f3e5ab;
            --glass: rgba(255, 255, 255, 0.05);
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: radial-gradient(circle at center, #065f46, #022c22);
            font-family: 'Poppins', 'Noto Nastaliq Urdu', serif;
            color: #f0f0f0;
            min-height: 100vh;
            overflow-x: hidden;
            direction: rtl;
        }

        /* --- Splash Screen --- */
        #splash-screen {
            position: fixed;
            inset: 0;
            background: #022c22;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }

        .logo-3d {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--gold), #8e6d13);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            color: var(--emerald-deep);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: pulse3d 2s infinite ease-in-out;
        }

        @keyframes pulse3d {
            0%, 100% { transform: scale(1) rotateY(0deg); }
            50% { transform: scale(1.1) rotateY(15deg); box-shadow: 0 20px 50px rgba(16, 185, 129, 0.3); }
        }
        .logo-image {
    width: 50px;           /* Adjust size as needed */
    height: auto;          /* Maintains aspect ratio */
    display: block;        /* Removes extra spacing */
    margin: 0 auto;        /* Centers the image */
    
    /* Optional effects */
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
    transition: transform 0.3s ease;
}

.logo-image:hover {
    transform: scale(1.1);  /* Slight zoom on hover */
}

        /* --- Main Layout --- */
        #main-content {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s ease-out;
            padding: 2rem 1rem;
            max-width: 1100px;
            margin: 0 auto;
        }

        .header { text-align: center; margin-bottom: 3rem; }
        #live-clock { font-size: 3rem; font-weight: 800; color: var(--gold); text-shadow: 0 0 20px rgba(212,175,55,0.3); }
        #live-date { color: var(--gold-light); font-size: 1.1rem; opacity: 0.8; }

        .btn-gear { 
            position: fixed; top: 20px; left: 20px; 
            background: var(--glass); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2); 
            width: 50px; height: 50px; border-radius: 15px; 
            cursor: pointer; z-index: 1000; color: var(--gold);
            font-size: 1.5rem; transition: 0.3s;
        }
        .btn-gear:hover { background: var(--gold); color: var(--emerald-deep); transform: rotate(90deg); }

        /* --- Hero Cards --- */
        .hero-stats { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px; margin-bottom: 40px; 
        }
        .hero-card { 
            background: var(--glass); backdrop-filter: blur(15px);
            padding: 25px; border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center; border-top: 4px solid var(--gold);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .hero-card h3 { color: var(--emerald-light); font-size: 0.9rem; margin-bottom: 10px; letter-spacing: 1px; }

        /* --- Saat Lists --- */
        .saat-wrapper { display: grid; grid-template-columns: 1fr; gap: 30px; }
        @media (min-width: 850px) { .saat-wrapper { grid-template-columns: 1fr 1fr; } }

        .saat-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
            padding: 15px 25px; border-radius: 18px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .saat-card:hover { transform: scale(1.03) translateX(-5px); background: rgba(255,255,255,0.1); }
        .saat-card.active { 
            border: 2px solid var(--gold); 
            background: rgba(212, 175, 55, 0.1);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .saat-name { font-weight: bold; font-size: 1.4rem; display: block; }
        .saat-detail { font-size: 0.8rem; opacity: 0.7; }
        .time-val { font-family: 'Poppins'; font-size: 0.95rem; font-weight: 600; color: var(--gold-light); text-align: left;}

        /* --- Text Colors --- */
        .text-saad { color: #4ade80; }
        .text-saad-itisaal { color: #2dd4bf; }
        .text-saad-infisaal { color: #a7f3d0; }
        .text-bad { color: #fb7185; }
        .text-nahas { color: var(--danger); }
        .text-mumtazij { color: var(--warning); }

        /* --- Modal Styling --- */
        .modal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            z-index: 5000; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content { 
            background: var(--emerald-deep); padding: 30px; border-radius: 30px; 
            width: 100%; max-width: 450px; border: 1px solid var(--gold);
            max-height: 90vh; overflow-y: auto;
        }
        #modal-map { height: 200px; border-radius: 20px; margin: 15px 0; border: 2px solid var(--emerald-mid); }
        
        input, select { 
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; 
            border: 1px solid var(--emerald-mid); background: rgba(0,0,0,0.2); 
            color: white; font-family: inherit; outline: none;
        }
        label { font-size: 0.8rem; color: var(--gold); margin-top: 10px; display: block; }

        .btn-save {
            width: 100%; padding: 15px; background: var(--gold); color: var(--emerald-deep);
            border: none; border-radius: 15px; cursor: pointer; font-weight: bold;
            margin-top: 20px; font-size: 1rem; transition: 0.3s;
        }
        .btn-save:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }

    </style>
</head>
<body onload="initApp()">

    <div id="splash-screen">
       <div class="logo">
           <img src="https://raw.githubusercontent.com/tahirrafique1-pixel/saatfinder/main/public/satalogo.png" 
     alt="Sata Logo" 
     class="logo-image"
     id="main-logo">  </div>
        <h1 style="margin-top: 2rem; letter-spacing: 5px; color: var(--gold);">SA'AT DASHBOARD</h1>
    </div>

    <button class="btn-gear" onclick="toggleModal(true)">⚙️</button>

    <div id="main-content">
        <div class="header">
            <h1 style="color: white; margin-bottom: 0.5rem;">ساعت ڈیش بورڈ</h1>
            <div id="live-clock">00:00:00</div>
            <div id="live-date">-- --- ----</div>
        </div>

        <div class="hero-stats">
            <div class="hero-card">
                <h3>طلوع | غروب</h3>
                <div id="sunDisplay" style="font-size: 1.6rem; font-weight: bold; color: var(--gold-light);">--:-- | --:--</div>
            </div>
            <div class="hero-card" style="border-top-color: var(--emerald-light);">
                <h3>موجودہ ساعت</h3>
                <div id="curNameHero" style="font-weight: bold; font-size: 1.6rem;">--</div>
                <div id="currCountdown" style="font-size: 1.2rem; margin-top: 5px; color: var(--gold-light);">00:00</div>
            </div>
            <div class="hero-card">
                <h3>اگلی ساعت</h3>
                <div id="nextNameHero" style="font-weight: bold; font-size: 1.4rem; opacity: 0.7;">--</div>
                <div id="nextCountdown" style="font-size: 1rem; opacity: 0.6;">--</div>
            </div>
        </div>

        <div class="saat-wrapper">
            <div><h2 style="text-align:center; color: var(--gold); margin-bottom: 1.5rem;">دن کی ساعتیں</h2><div id="dayList"></div></div>
            <div><h2 style="text-align:center; color: var(--gold); margin-bottom: 1.5rem;">رات کی ساعتیں</h2><div id="nightList"></div></div>
        </div>
    </div>

    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h2 style="color: var(--gold); text-align: center;">ترتیبات</h2>
            <div id="modal-map"></div>
            <label>عرض بلد (Lat)</label><input type="number" step="any" id="lat">
            <label>طول بلد (Lon)</label><input type="number" step="any" id="lon">
            <label>تاریخ</label><input type="date" id="dateInput">
            <label>ٹائم زون</label><select id="tzSelect"></select>
            <button class="btn-save" onclick="saveSettings()">محفوظ کریں</button>
            <button onclick="toggleModal(false)" style="width:100%; background:none; border:none; color:gray; cursor:pointer; margin-top:10px;">بند کریں</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        let map, marker, saatData = [];
        
        const saatTableData = {
            "Sun": { name: "شمس", type: "سعد", class: "text-saad" },
            "Moon": { name: "قمر", type: "سعد انفصال", class: "text-saad-infisaal" },
            "Mars": { name: "مریخ", type: "نحس", class: "text-nahas" },
            "Mercury": { name: "عطارد", type: "ممتزج", class: "text-mumtazij" },
            "Jupiter": { name: "مشتری", type: "سعد اتصال", class: "text-saad-itisaal" },
            "Venus": { name: "زہرہ", type: "سعد اتصال", class: "text-saad-itisaal" },
            "Saturn": { name: "زحل", type: "نحس", class: "text-nahas" }
        };

        const planetaryOrder = ["Saturn", "Jupiter", "Mars", "Sun", "Venus", "Mercury", "Moon"];
        const dayStartPlanets = ["Sun", "Moon", "Mars", "Mercury", "Jupiter", "Venus", "Saturn"];

        function initApp() {
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                    const main = document.getElementById('main-content');
                    main.style.opacity = '1';
                    main.style.transform = 'translateY(0)';
                }, 500);
            }, 5000); // 5 Seconds Splash as requested

            document.getElementById('dateInput').valueAsDate = new Date();
            const tzSel = document.getElementById('tzSelect');
            Intl.supportedValuesOf('timeZone').forEach(tz => {
                let opt = document.createElement('option'); opt.value = tz; opt.text = tz; tzSel.appendChild(opt);
            });
            tzSel.value = Intl.DateTimeFormat().resolvedOptions().timeZone;

            map = L.map('modal-map').setView([31.3753, 73.3451], 5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            marker = L.marker([31.3753, 73.3451], {draggable: true}).addTo(map);

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => {
                    const lat = p.coords.latitude; const lon = p.coords.longitude;
                    document.getElementById('lat').value = lat.toFixed(6);
                    document.getElementById('lon').value = lon.toFixed(6);
                    marker.setLatLng([lat, lon]); map.setView([lat, lon], 12);
                    saveSettings();
                }, () => saveSettings());
            }
        }

        async function saveSettings() {
            toggleModal(false);
            const lat = document.getElementById('lat').value || 31.3753;
            const lon = document.getElementById('lon').value || 73.3451;
            const date = document.getElementById('dateInput').value;
            const res = await fetch(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lon}&date=${date}&formatted=0`);
            const data = await res.json();
            
            const sunrise = new Date(data.results.sunrise);
            const sunset = new Date(data.results.sunset);
            document.getElementById('sunDisplay').innerText = 
                `${sunrise.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'})} | ${sunset.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'})}`;
            
            calculateSaats(sunrise, sunset);
        }

        function calculateSaats(sunrise, sunset) {
            const dayDur = (sunset - sunrise) / 12;
            const nightDur = (86400000 - (sunset - sunrise)) / 12;
            let startPlanet = dayStartPlanets[sunrise.getDay()];
            let startIndex = planetaryOrder.indexOf(startPlanet);

            saatData = [];
            let curr = new Date(sunrise);
            for(let i=0; i<24; i++) {
                let end = new Date(curr.getTime() + (i < 12 ? dayDur : nightDur));
                let pKey = planetaryOrder[(startIndex + i) % 7];
                let info = saatTableData[pKey];
                saatData.push({ ...info, start: new Date(curr), end: end });
                curr = end;
            }
            renderUI();
        }

        function renderUI() {
            const dayL = document.getElementById('dayList'); const nightL = document.getElementById('nightList');
            dayL.innerHTML = ''; nightL.innerHTML = '';
            saatData.forEach((s, i) => {
                const card = `
                    <div class="saat-card" id="saat-${i}">
                        <div>
                            <span class="saat-name ${s.class}">${s.name}</span>
                            <span class="saat-detail">${s.type}</span>
                        </div>
                        <div style="text-align:left;">
                            <div class="time-val">${s.start.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'})}</div>
                            <div class="time-val" style="opacity:0.5; font-size:0.8rem;">تا ${s.end.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'})}</div>
                        </div>
                    </div>`;
                if(i < 12) dayL.innerHTML += card; else nightL.innerHTML += card;
            });
        }

        function toggleModal(s) { document.getElementById('settingsModal').style.display = s?'flex':'none'; if(s) setTimeout(()=>map.invalidateSize(),200); }

        setInterval(() => {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-GB');
            document.getElementById('live-date').innerText = now.toLocaleDateString('ur-PK', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            saatData.forEach((s, i) => {
                const el = document.getElementById(`saat-${i}`);
                if(now >= s.start && now < s.end) {
                    el.classList.add('active');
                    const heroTitle = document.getElementById('curNameHero');
                    heroTitle.innerText = `${s.name} (${s.type})`;
                    heroTitle.className = s.class; 
                    
                    let diff = Math.floor((s.end - now) / 1000);
                    document.getElementById('currCountdown').innerText = `${Math.floor(diff/60)} منٹ ${diff%60} سیکنڈ باقی`;
                    
                    if(saatData[i+1]) {
                        document.getElementById('nextNameHero').innerText = saatData[i+1].name;
                        let nDiff = Math.floor((saatData[i+1].start - now) / 60000);
                        document.getElementById('nextCountdown').innerText = `آغاز بذریعہ ${nDiff} منٹ`;
                    }
                } else { if(el) el.classList.remove('active'); }
            });
        }, 1000);
    </script>
</body>
</html>
